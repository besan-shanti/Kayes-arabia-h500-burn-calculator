<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>H500 Burn Time Calculator</title>
    <script>
      // Redirect 404s to the root index.html for client-side routing
      const path = window.location.pathname.replace(/\/$/, '');
      const segments = path.split('/').filter(Boolean);
      
      // If the last segment doesn't look like a file, redirect to root
      if (!segments[segments.length - 1]?.includes('.')) {
        window.location.replace(
          '/Kayes-arabia-h500-burn-calculator/#' + path
        );
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
